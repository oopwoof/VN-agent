name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: uv sync --dev --extra web
      - name: Lint
        run: uv run ruff check src/ tests/
      - name: Type check
        run: uv run mypy src/vn_agent/ --ignore-missing-imports
      - name: Test
        run: uv run pytest -x --tb=short -m "not slow" --cov=src/vn_agent --cov-fail-under=70
