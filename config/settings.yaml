llm:
  # ── Active provider ────────────────────────────────────────────────────────
  # "anthropic" → uses ANTHROPIC_API_KEY
  # "openai"    → uses OPENAI_API_KEY (or api_key below; also works with local servers)
  default_provider: anthropic
  model: claude-sonnet-4-6
  temperature: 0.7
  max_tokens: 16000
  max_retries: 3
  retry_wait: 2.0

  # Optional: override API endpoint and key for local / free providers.
  # Leave empty ("") to use the provider's default endpoint + env-var key.
  # See config/presets/ for ready-to-use examples.
  base_url: ""   # e.g. http://localhost:11434/v1 for Ollama
  api_key: ""    # explicit key (use "ollama" as dummy for local servers)

  # Per-agent model overrides (balance quality vs cost)
  # Rule (Sprint 7-3): Sonnet = narrative analysis / structural diagnosis /
  # style comparison / high-level suggestions. Haiku = quick local checks,
  # simple polishing, single-item batch processing.
  director_model: claude-sonnet-4-6          # narrative structure — sonnet
  writer_model: claude-sonnet-4-6            # dialogue craft — sonnet
  reviewer_model: claude-sonnet-4-6          # full-script rubric + diagnosis — sonnet (was haiku; Sprint 7-3)
  character_designer_model: claude-haiku-4-5-20251001  # 1-shot visual profile JSON — haiku
  scene_artist_model: claude-haiku-4-5-20251001       # single prompt formatting — haiku
  music_director_model: claude-haiku-4-5-20251001     # mood classification — haiku
  judge_model: claude-sonnet-4-6             # eval_strategy_adherence per-scene judge — sonnet (Sprint 7-3)

image_gen:
  provider: openai  # openai | stability
  model: dall-e-3
  size: "1024x1024"
  quality: standard

music:
  strategy: library  # library | suno | hybrid
  library_path: config/music_library.yaml
  audio_format: ogg

generation:
  max_scenes: 20
  max_revision_rounds: 3
  min_dialogue_lines: 5
  max_dialogue_lines: 20
  reviewer_skip_llm: false

corpus_path: "data/final_annotations.csv"
few_shot_k: 2
