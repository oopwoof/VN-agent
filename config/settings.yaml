llm:
  # ── Active provider ────────────────────────────────────────────────────────
  # "anthropic" → uses ANTHROPIC_API_KEY
  # "openai"    → uses OPENAI_API_KEY (or api_key below; also works with local servers)
  default_provider: anthropic
  model: claude-sonnet-4-6
  temperature: 0.7
  max_tokens: 16000
  max_retries: 3
  retry_wait: 2.0

  # Optional: override API endpoint and key for local / free providers.
  # Leave empty ("") to use the provider's default endpoint + env-var key.
  # See config/presets/ for ready-to-use examples.
  base_url: ""   # e.g. http://localhost:11434/v1 for Ollama
  api_key: ""    # explicit key (use "ollama" as dummy for local servers)

  # Per-agent model overrides (balance quality vs cost)
  # Rule (Sprint 7-3): Sonnet = narrative analysis / structural diagnosis /
  # style comparison / high-level suggestions. Haiku = quick local checks,
  # simple polishing, single-item batch processing.
  director_model: claude-sonnet-4-6          # narrative structure — sonnet
  writer_model: claude-sonnet-4-6            # dialogue craft — sonnet
  # Two-tier review (Sprint 7-5):
  #   structure_reviewer runs BEFORE Writer, on outline — sonnet needed for
  #     narrative judgment (branch intent alignment, arc shape).
  #   reviewer (dialogue) runs AFTER Writer, on produced text — haiku
  #     sufficient for format / ID / keyword / rubric checks, and cheaper
  #     to run on potentially-many revision rounds.
  structure_reviewer_model: claude-sonnet-4-6
  # Sprint 7-5b: DialogueReviewer back to Sonnet.
  # Per the model-selection rule (Sonnet = narrative/style analysis),
  # dialogue review is voice/subtext/arc/pacing judgment — that's
  # craft-level narrative work, not mechanical. Haiku couldn't
  # discriminate on these dimensions (satisfaction bias). Mechanical
  # checks moved to pure-Python _mechanical_check() pre-gate which
  # fails fast before the Sonnet call, so the Sonnet reviewer only
  # spends tokens when the output is at least structurally valid.
  reviewer_model: claude-sonnet-4-6
  character_designer_model: claude-haiku-4-5-20251001  # 1-shot visual profile JSON — haiku
  scene_artist_model: claude-haiku-4-5-20251001       # single prompt formatting — haiku
  music_director_model: claude-haiku-4-5-20251001     # mood classification — haiku
  judge_model: claude-sonnet-4-6             # eval_strategy_adherence per-scene judge — sonnet (Sprint 7-3)

# Yaml flattening: section.key → section_key. Config.py has `image_provider`
# and `image_model`, so this section MUST be named `image:` (not `image_gen:`)
# for the override to take effect. Prior config had `image_gen:` which
# silently degraded to defaults.
image:
  # Sprint 10-1: google_gemini (Nano Banana) is the new default — multi-image
  # reference support + same price as gpt-image-1 + faster inference.
  # Chain automatically falls back to openai_gpt_image / openai / stability
  # on infrastructure failures (429/5xx), not on content/auth errors.
  provider: google_gemini  # google_gemini | openai | openai_gpt_image | stability
  model: gemini-2.5-flash-image

music:
  strategy: library  # library | suno | hybrid
  library_path: config/music_library.yaml
  audio_format: ogg

generation:
  max_scenes: 20
  max_revision_rounds: 3
  min_dialogue_lines: 5
  max_dialogue_lines: 20
  reviewer_skip_llm: false

corpus_path: "data/final_annotations.csv"
few_shot_k: 2
