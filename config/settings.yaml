llm:
  default_provider: anthropic
  model: claude-sonnet-4-6
  temperature: 0.7
  max_tokens: 16000
  max_retries: 3
  retry_wait: 2.0

  # Per-agent model overrides (balance quality vs cost)
  director_model: claude-sonnet-4-6          # complex planning — keep sonnet
  writer_model: claude-sonnet-4-6            # dialogue quality — keep sonnet
  reviewer_model: claude-haiku-4-5-20251001        # structural + short quality check — haiku sufficient
  character_designer_model: claude-haiku-4-5-20251001  # simple JSON visual profile — haiku
  scene_artist_model: claude-haiku-4-5-20251001       # prompt formatting — haiku
  music_director_model: claude-haiku-4-5-20251001     # mood assignment — haiku

image_gen:
  provider: openai  # openai | stability
  model: dall-e-3
  size: "1024x1024"
  quality: standard

music:
  strategy: library  # library | suno | hybrid
  library_path: config/music_library.yaml
  audio_format: ogg

generation:
  max_scenes: 20
  max_revision_rounds: 3
  min_dialogue_lines: 5
  max_dialogue_lines: 20
