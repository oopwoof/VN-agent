services:
  vn-agent:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    environment:
      - VN_AGENT_OUTPUT_DIR=/app/output
      - VN_AGENT_DB_PATH=/app/data/vn_jobs.db
    volumes:
      - vn-output:/app/output
      - vn-data:/app/data

  # Optional: local LLM via Ollama (zero cost)
  # Start with: docker compose --profile ollama up
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    profiles:
      - ollama

volumes:
  vn-output:
  vn-data:
  ollama-models:
